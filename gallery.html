    <style>

        .gallery{
            width:90%;
            max-width:1200px;
            margin:40px auto;
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:20px;
        }

        .gallery img{
            width:100%;
            height:220px;
            object-fit:cover;
            border-radius:10px;
            transition:0.3s;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        .gallery img:hover{
            transform:scale(1.05);
        }

        h1{
            text-align:center;
            margin-top:40px;
            color:#003366;
        }

        p{
            text-align:center;
            margin-top:10px;
            margin-bottom:30px;
        }

        @media(max-width:768px){

            .gallery{
                grid-template-columns:repeat(2,1fr);
            }

        }

    </style>

</head>
